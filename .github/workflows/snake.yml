name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"
      - "scripts/enhance_snake.py"

concurrency:
  group: contribution-snake
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate branded contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#8250df&color_dots=#ebedf0,#b6e3ff,#80ccff,#54aeff,#0969da
            dist/github-contribution-grid-snake-dark.svg?color_snake=#a371f7&color_dots=#161b22,#0b3b60,#0c5d8f,#1f9cf0,#58a6ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grow snake in length while eating contributions
        run: |
          python scripts/enhance_snake.py \
            dist/github-contribution-grid-snake.svg \
            dist/github-contribution-grid-snake-dark.svg \
            --initial-visible 4

      - name: Publish animation to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: refresh length-growing contribution snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
